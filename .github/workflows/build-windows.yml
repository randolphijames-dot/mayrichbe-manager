name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 支持手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            electron/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install Python Dependencies
        run: |
          pip install pyinstaller
          pip install -r backend/requirements.txt

      - name: Build Python Backend (PyInstaller)
        run: |
          cd backend
          pyinstaller --onefile --name backend_win `
            --collect-all "app" `
            --collect-all "instagrapi" `
            --hidden-import "apscheduler.triggers.date" `
            --hidden-import "apscheduler.jobstores.sqlalchemy" `
            --hidden-import "apscheduler.executors.pool" `
            --noconfirm `
            --distpath ../electron/backend-dist `
            run_server.py

      - name: Copy backend_win.exe to backend
        run: |
          Copy-Item electron/backend-dist/backend_win.exe backend/

      - name: Install Electron dependencies
        run: cd electron && npm ci

      - name: Build Electron (Windows)
        run: cd electron && npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: Mayrichbe-Manager-Windows
          path: |
            dist-electron/*.exe
            dist-electron/*.zip
